name: CLI Release

on:
  push:
    tags:
      - "cli/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

env:
  CLI_DIR: packages/cli

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF#refs/tags/cli/v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=cli/v$VER" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        working-directory: ${{ env.CLI_DIR }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: ${{ env.CLI_DIR }}
        run: bun install --frozen-lockfile

      - name: Sync version and build binaries
        working-directory: ${{ env.CLI_DIR }}
        run: |
          bash scripts/sync-version.sh
          bash scripts/build-binaries.sh

      - name: Generate checksums
        working-directory: ${{ env.CLI_DIR }}/dist
        run: |
          sha256sum web42-linux-x64 web42-darwin-x64 web42-darwin-arm64 web42-windows-x64.exe > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "CLI v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            ${{ env.CLI_DIR }}/dist/web42-linux-x64
            ${{ env.CLI_DIR }}/dist/web42-darwin-x64
            ${{ env.CLI_DIR }}/dist/web42-darwin-arm64
            ${{ env.CLI_DIR }}/dist/web42-windows-x64.exe
            ${{ env.CLI_DIR }}/dist/checksums.txt

  publish-npm:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies and build
        working-directory: ${{ env.CLI_DIR }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Publish to npm
        working-directory: ${{ env.CLI_DIR }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/cli/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets for checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_URL="https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v${VERSION}"
          curl -fsSL -o web42-linux-x64 "${BASE_URL}/web42-linux-x64"
          curl -fsSL -o web42-darwin-x64 "${BASE_URL}/web42-darwin-x64"
          curl -fsSL -o web42-darwin-arm64 "${BASE_URL}/web42-darwin-arm64"

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "linux_x64=$(sha256sum web42-linux-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(sha256sum web42-darwin-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=$(sha256sum web42-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: yarn-rp/homebrew-web42
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > homebrew-tap/Formula/web42.rb << 'FORMULA_EOF'
          class Web42 < Formula
            desc "CLI for the Web42 Agent Marketplace"
            homepage "https://web42.ai"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v${{ steps.version.outputs.version }}/web42-darwin-arm64"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v${{ steps.version.outputs.version }}/web42-darwin-x64"
                sha256 "${{ steps.sha.outputs.darwin_x64 }}"
              end
            end

            on_linux do
              url "https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v${{ steps.version.outputs.version }}/web42-linux-x64"
              sha256 "${{ steps.sha.outputs.linux_x64 }}"
            end

            def install
              binary_name = stable.url.split("/").last
              bin.install binary_name => "web42"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/web42 --version").strip
            end
          end
          FORMULA_EOF

      - name: Push updated formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/web42.rb
          git commit -m "web42 ${{ steps.version.outputs.version }}"
          git push

  update-scoop:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/cli/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows binary for checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -fsSL -o web42-windows-x64.exe \
            "https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v${VERSION}/web42-windows-x64.exe"

      - name: Compute SHA256
        id: sha
        run: echo "win_x64=$(sha256sum web42-windows-x64.exe | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Scoop bucket
        uses: actions/checkout@v4
        with:
          repository: yarn-rp/scoop-web42
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.win_x64 }}"
          cat > scoop-bucket/bucket/web42.json << EOF
          {
            "version": "${VERSION}",
            "description": "CLI for the Web42 Agent Marketplace",
            "homepage": "https://web42.ai",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v${VERSION}/web42-windows-x64.exe#/web42.exe",
                "hash": "${SHA}"
              }
            },
            "bin": "web42.exe",
            "checkver": {
              "github": "https://github.com/yarn-rp/web42-marketplace",
              "regex": "cli/v([\\\\d.]+)"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/yarn-rp/web42-marketplace/releases/download/cli/v\$version/web42-windows-x64.exe#/web42.exe"
                }
              }
            }
          }
          EOF

      - name: Push updated manifest
        working-directory: scoop-bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/web42.json
          git commit -m "web42 ${{ steps.version.outputs.version }}"
          git push
